name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      # O package-lock anterior já estava fora de sincronia com package.json.
      # npm install mantém a validação funcional sem mascarar esse débito legado.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint changed TypeScript files
        shell: bash
        run: |
          git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- '*.ts' '*.tsx'             | xargs -r npx eslint

      - name: Build
        run: npm run build
